<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bellring Property Group</title>
  <meta name="description" content="Premium Property Services — Investment, Management & Real Estate Solutions across Cape Town" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 22s linear infinite',
            'spin-slow-reverse': 'spin 15s linear infinite reverse',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0f172a; }
    @keyframes bounce { 0%,100%{transform:translateY(-8%);animation-timing-function:cubic-bezier(.8,0,1,1)} 50%{transform:none;animation-timing-function:cubic-bezier(0,0,.2,1)} }
    .animate-bounce { animation: bounce 1s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 22s linear infinite; }
    .animate-spin-slow-reverse { animation: spin 15s linear infinite reverse; }
    @keyframes spin-fast { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin-fast 1s linear infinite; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, Fragment } = React;

    // ── Lucide-style SVG icons (inline, no dependency) ──
    const Icon = ({ d, size = 24, className = '', strokeWidth = 2, viewBox = "0 0 24 24" }) => (
      <svg width={size} height={size} viewBox={viewBox} fill="none" stroke="currentColor"
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((p,i) => <path key={i} d={p}/>) : <path d={d}/>}
      </svg>
    );

    const Icons = {
      Bell: (p) => <Icon {...p} d={["M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9","M13.73 21a2 2 0 0 1-3.46 0"]} />,
      TrendingUp: (p) => <Icon {...p} d="M23 6l-9.5 9.5-5-5L1 18" />,
      DollarSign: (p) => <Icon {...p} d={["M12 1v22","M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"]} />,
      Home: (p) => <Icon {...p} d={["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10"]} />,
      Key: (p) => <Icon {...p} d={["M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"]} />,
      FileText: (p) => <Icon {...p} d={["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6","M16 13H8","M16 17H8","M10 9H8"]} />,
      Users: (p) => <Icon {...p} d={["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2","M23 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75"]} viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/></Icon>,
      Building: (p) => <Icon {...p} d={["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10","M3 9h18"]} />,
      BarChart3: (p) => <Icon {...p} d={["M3 3v18h18","M18 17V9","M13 17V5","M8 17v-3"]} />,
      ArrowRight: (p) => <Icon {...p} d={["M5 12h14","M12 5l7 7-7 7"]} />,
      Check: (p) => <Icon {...p} d="M20 6L9 17l-5-5" />,
      MapPin: (p) => <Icon {...p} d={["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"]}><circle cx="12" cy="10" r="3"/></Icon>,
      Target: (p) => <Icon {...p} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z","M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"]} />,
      Briefcase: (p) => <Icon {...p} d={["M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z","M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"]} />,
      GraduationCap: (p) => <Icon {...p} d={["M22 10v6M2 10l10-5 10 5-10 5z","M6 12v5c3 3 9 3 12 0v-5"]} />,
      Globe: (p) => <Icon {...p} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M2 12h20","M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"]} />,
      Landmark: (p) => <Icon {...p} d={["M3 22h18","M6 18V9","M10 18V9","M14 18V9","M18 18V9","M12 2L2 7h20z"]} />,
      Zap: (p) => <Icon {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
      RefreshCw: (p) => <Icon {...p} d={["M23 4v6h-6","M1 20v-6h6","M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"]} />,
      CheckCircle: (p) => <Icon {...p} d={["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4L12 14.01l-3-3"]} />,
      ChevronRight: (p) => <Icon {...p} d="M9 18l6-6-6-6" />,
      Activity: (p) => <Icon {...p} d="M22 12h-4l-3 9L9 3l-3 9H2" />,
    };

    function App() {
      const [ring, setRing] = useState(false);
      const [activeSegment, setActiveSegment] = useState(null);
      const [activeIntegration, setActiveIntegration] = useState(null);
      const [flowStep, setFlowStep] = useState(0);
      const [demoRunning, setDemoRunning] = useState(false);

      const playDingDong = () => {
        setRing(true);
        setTimeout(() => setRing(false), 600);
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o1 = ctx.createOscillator(), g1 = ctx.createGain();
          o1.connect(g1); g1.connect(ctx.destination);
          o1.frequency.value = 659.25;
          g1.gain.setValueAtTime(0.3, ctx.currentTime);
          g1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
          o1.start(); o1.stop(ctx.currentTime + 0.6);
          const o2 = ctx.createOscillator(), g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.frequency.value = 523.25;
          g2.gain.setValueAtTime(0, ctx.currentTime);
          g2.gain.setValueAtTime(0.3, ctx.currentTime + 0.3);
          g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);
          o2.start(ctx.currentTime + 0.3); o2.stop(ctx.currentTime + 1.2);
        } catch(e) {}
      };

      const services = [
        { icon: Icons.TrendingUp, title:"Property Investment", desc:"Strategic investment opportunities with 15-20% projected returns", color:"from-blue-400 to-blue-600" },
        { icon: Icons.DollarSign, title:"Property Valuation", desc:"Accurate market valuations from certified professionals", color:"from-green-400 to-green-600" },
        { icon: Icons.Home, title:"Property Management", desc:"Full-service management with 98% occupancy rates", color:"from-purple-400 to-purple-600" },
        { icon: Icons.Key, title:"Property Agency", desc:"Buy, sell, and rent properties with expert guidance", color:"from-orange-400 to-orange-600" },
        { icon: Icons.FileText, title:"Legal & Documentation", desc:"Complete legal support for all property transactions", color:"from-red-400 to-red-600" },
        { icon: Icons.Users, title:"Tenant Services", desc:"Premium tenant screening and relationship management", color:"from-pink-400 to-pink-600" },
      ];

      const targetMarkets = [
        { id:'investors', icon:Icons.Briefcase, label:'Private Investors', emoji:'💼', color:'from-yellow-400 to-orange-500', border:'border-yellow-400', income:'R500K+ capital', age:'35–60', goal:'Passive income & portfolio growth', needs:['High-yield rental assets','Off-plan opportunities','Quarterly reporting'], share:'38%', iconColor:'text-slate-900' },
        { id:'corporate', icon:Icons.Landmark, label:'Corporate & Institutional', emoji:'🏦', color:'from-blue-400 to-indigo-600', border:'border-blue-400', income:'R5M+ portfolio', age:'Institutional', goal:'Commercial & mixed-use acquisitions', needs:['Bulk acquisition deals','Due diligence support','Asset management'], share:'21%', iconColor:'text-white' },
        { id:'firsthome', icon:Icons.Home, label:'First-Time Buyers', emoji:'🏠', color:'from-green-400 to-emerald-600', border:'border-green-400', income:'R25K–R60K/month', age:'25–38', goal:'Affordable entry into homeownership', needs:['Bond assistance','Neighbourhood guides','Inspection support'], share:'24%', iconColor:'text-white' },
        { id:'diaspora', icon:Icons.Globe, label:'SA Diaspora', emoji:'✈️', color:'from-purple-400 to-violet-600', border:'border-purple-400', income:'Foreign currency income', age:'30–55', goal:'Invest back home remotely', needs:['Remote management','FX-friendly payments','Legal compliance'], share:'11%', iconColor:'text-white' },
        { id:'professionals', icon:Icons.GraduationCap, label:'Young Professionals', emoji:'🎓', color:'from-pink-400 to-rose-600', border:'border-pink-400', income:'R20K–R45K/month', age:'24–35', goal:'Build equity early', needs:['Sectional title units','Cape Town CBD access','Flexible leases'], share:'6%', iconColor:'text-white' },
      ];

      const integrations = [
        { id:'xero', name:'Xero', category:'Accounting', color:'from-blue-500 to-cyan-400', border:'border-cyan-400', glow:'shadow-cyan-400/40', bg:'bg-cyan-400/10', logo:'𝕏', logoColor:'#13B5EA', desc:'Automated bookkeeping, rental income reconciliation & SA tax reporting', features:['Auto-reconcile rental payments','VAT returns & SARS compliance','Owner statements monthly','Real-time P&L dashboard'], trigger:'New rent received', action:'Create invoice & reconcile ledger', stat:{value:'R23.5M',label:'Tracked'} },
        { id:'payprop', name:'PayProp', category:'Rental Payments', color:'from-green-500 to-emerald-400', border:'border-emerald-400', glow:'shadow-emerald-400/40', bg:'bg-emerald-400/10', logo:'₱', logoColor:'#22c55e', desc:'SA-built rental payment platform — collect, reconcile & pay out automatically', features:['Automated tenant collections','Instant landlord payouts','Arrears management','Trust accounting'], trigger:'Tenant payment received', action:'Payout landlord & update ledger', stat:{value:'98%',label:'Collection rate'} },
        { id:'payfast', name:'PayFast', category:'SA Payments', color:'from-orange-500 to-amber-400', border:'border-amber-400', glow:'shadow-amber-400/40', bg:'bg-amber-400/10', logo:'⚡', logoColor:'#f59e0b', desc:'South African payment gateway for EFT, credit cards & instant EFT', features:['EFT & card payments','Instant EFT via Ozow','Subscription billing','SA-compliant processing'], trigger:'Deposit / booking fee paid', action:'Confirm reservation & notify agent', stat:{value:'R500K+',label:'Min. investment'} },
        { id:'stripe', name:'Stripe', category:'Global Payments', color:'from-violet-500 to-purple-400', border:'border-violet-400', glow:'shadow-violet-400/40', bg:'bg-violet-400/10', logo:'S', logoColor:'#635BFF', desc:'International investor payments — USD, EUR, GBP accepted globally', features:['Multi-currency investing','Diaspora investor portal','Automatic FX conversion','Stripe Connect payouts'], trigger:'Foreign investor payment', action:'Convert currency & issue receipt', stat:{value:'135+',label:'Currencies'} },
        { id:'sheets', name:'Google Sheets', category:'Reporting', color:'from-green-600 to-lime-400', border:'border-lime-400', glow:'shadow-lime-400/40', bg:'bg-lime-400/10', logo:'📊', logoColor:'#84cc16', desc:'Live portfolio dashboards, occupancy trackers & investor reports', features:['Live occupancy dashboard','Investor ROI tracker','Maintenance log','Monthly board reports'], trigger:'Any property event', action:'Update live portfolio sheet', stat:{value:'47',label:'Properties tracked'} },
        { id:'typeform', name:'Typeform', category:'Lead Capture', color:'from-pink-500 to-rose-400', border:'border-rose-400', glow:'shadow-rose-400/40', bg:'bg-rose-400/10', logo:'T', logoColor:'#f43f5e', desc:'Beautiful forms for tenant applications, investor onboarding & enquiries', features:['Tenant application forms','Investor onboarding flow','Property enquiry capture','FICA document upload'], trigger:'Form submitted', action:'Create CRM lead & notify agent', stat:{value:'3min',label:'Avg. completion'} },
      ];

      const flowSteps = [
        { icon:'T', label:'Typeform', desc:'Tenant submits application', color:'text-rose-400', bg:'bg-rose-400/20', border:'border-rose-400' },
        { icon:'⚡', label:'Zapier', desc:'Trigger fires automatically', color:'text-yellow-400', bg:'bg-yellow-400/20', border:'border-yellow-400' },
        { icon:'₱', label:'PayProp', desc:'Collect deposit payment', color:'text-emerald-400', bg:'bg-emerald-400/20', border:'border-emerald-400' },
        { icon:'𝕏', label:'Xero', desc:'Invoice created & reconciled', color:'text-cyan-400', bg:'bg-cyan-400/20', border:'border-cyan-400' },
        { icon:'📊', label:'Sheets', desc:'Portfolio dashboard updated', color:'text-lime-400', bg:'bg-lime-400/20', border:'border-lime-400' },
        { icon:'✅', label:'Done', desc:'Agent notified via email', color:'text-yellow-400', bg:'bg-yellow-400/20', border:'border-yellow-400' },
      ];

      const runDemo = () => {
        if (demoRunning) return;
        setDemoRunning(true); setFlowStep(0);
        let step = 0;
        const iv = setInterval(() => {
          step++;
          setFlowStep(step);
          if (step >= flowSteps.length - 1) {
            clearInterval(iv);
            setTimeout(() => { setDemoRunning(false); setFlowStep(0); }, 3000);
          }
        }, 700);
      };

      return (
        <div className="min-h-screen bg-slate-900">

          {/* NAV */}
          <nav className="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-4">
              <div className="flex items-center gap-4">
                <button onClick={playDingDong} className={`bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:scale-110 transition-transform ${ring ? 'animate-bounce' : ''}`}>
                  <Icons.Bell size={24} className="text-slate-900" strokeWidth={2.5} />
                </button>
                <span className="text-3xl font-bold text-yellow-400">Bellring</span>
              </div>
              <div className="flex items-center gap-5 flex-wrap">
                {['services','markets','integrations','about'].map(s => (
                  <a key={s} href={`#${s}`} className="text-slate-300 hover:text-yellow-400 transition-colors text-sm capitalize">{s}</a>
                ))}
                <button className="bg-yellow-400 text-slate-900 px-5 py-2 rounded-lg font-semibold hover:bg-yellow-300 transition-colors text-sm">Contact Us</button>
              </div>
            </div>
          </nav>

          {/* HERO */}
          <section className="relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-br from-purple-900/20 to-slate-900"></div>
            <div className="max-w-7xl mx-auto px-6 py-24 relative text-center">
              <div className="flex items-center justify-center gap-6 mb-6 flex-wrap">
                <button onClick={playDingDong} className={`bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full w-32 h-32 flex items-center justify-center shadow-2xl hover:scale-110 transition-transform ${ring ? 'animate-bounce' : ''}`}>
                  <Icons.Bell size={70} className="text-slate-900" strokeWidth={2.5} />
                </button>
                <h1 className="text-7xl md:text-8xl font-bold text-yellow-400">Bellring</h1>
              </div>
              <p className="text-2xl md:text-3xl text-yellow-300 italic mb-6" style={{fontFamily:'cursive'}}>! come on in, how can we help you !</p>
              <p className="text-3xl md:text-4xl text-white font-bold mb-6">Premium Property Services</p>
              <p className="text-xl text-slate-300 mb-12 max-w-3xl mx-auto">Your trusted partner in property investment, management, and real estate solutions across Cape Town</p>
              <a href="#services" className="bg-yellow-400 text-slate-900 px-10 py-4 rounded-lg font-bold text-lg hover:bg-yellow-300 transition-colors inline-flex items-center gap-2">
                Explore Our Services <Icons.ArrowRight size={24} />
              </a>
            </div>
          </section>

          {/* SERVICES */}
          <section id="services" className="py-24 bg-slate-800">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <h2 className="text-5xl font-bold text-white mb-4">Our Services</h2>
                <p className="text-xl text-slate-300">Comprehensive property solutions tailored to your needs</p>
              </div>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                {services.map((s,i) => (
                  <div key={i} className="bg-slate-900 rounded-2xl p-8 hover:scale-105 transition-transform duration-300 border border-slate-700 hover:border-yellow-400">
                    <div className={`bg-gradient-to-br ${s.color} w-20 h-20 rounded-2xl flex items-center justify-center mb-6 shadow-lg`}>
                      <s.icon className="text-white" size={40} strokeWidth={2} />
                    </div>
                    <h3 className="text-2xl font-bold text-white mb-3">{s.title}</h3>
                    <p className="text-slate-300 leading-relaxed">{s.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* STATS */}
          <section className="py-24 bg-gradient-to-br from-purple-900/30 to-slate-900">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                {[['47','Properties Managed'],['98%','Occupancy Rate'],['R23.5M','Portfolio Value'],['15+','Years Experience']].map(([v,l]) => (
                  <div key={l}><div className="text-5xl md:text-6xl font-bold text-yellow-400 mb-2">{v}</div><div className="text-slate-300">{l}</div></div>
                ))}
              </div>
            </div>
          </section>

          {/* TARGET MARKET GRID */}
          <section id="markets" className="py-24 bg-slate-800">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <div className="inline-flex items-center gap-3 bg-yellow-400/10 border border-yellow-400/30 rounded-full px-6 py-2 mb-6">
                  <Icons.Target size={18} className="text-yellow-400" />
                  <span className="text-yellow-400 text-sm font-semibold tracking-widest uppercase">Target Market</span>
                </div>
                <h2 className="text-5xl font-bold text-white mb-4">Who We Serve</h2>
                <p className="text-xl text-slate-300 max-w-2xl mx-auto">Click any segment to explore needs, goals & market share</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-12 gap-5 mb-10">
                {targetMarkets.filter(m=>m.id==='investors').map(m=>(
                  <button key={m.id} onClick={()=>setActiveSegment(activeSegment===m.id?null:m.id)}
                    className={`md:col-span-5 text-left rounded-3xl p-8 border-2 transition-all duration-300 bg-slate-900 hover:scale-105 shadow-xl ${activeSegment===m.id?`${m.border} shadow-2xl`:'border-slate-700'}`}>
                    <div className={`bg-gradient-to-br ${m.color} w-16 h-16 rounded-2xl flex items-center justify-center mb-5`}><m.icon size={32} className="text-slate-900" strokeWidth={2.5}/></div>
                    <div className="flex items-start justify-between mb-3">
                      <h3 className="text-2xl font-bold text-white">{m.emoji} {m.label}</h3>
                      <span className={`bg-gradient-to-br ${m.color} text-slate-900 font-black text-xl px-4 py-1 rounded-xl`}>{m.share}</span>
                    </div>
                    <p className="text-slate-400 text-sm">Age: <span className="text-slate-200">{m.age}</span> · Income: <span className="text-slate-200">{m.income}</span></p>
                    <p className="text-slate-300 mt-3">{m.goal}</p>
                    {activeSegment===m.id && <ul className="mt-5 space-y-2">{m.needs.map(n=><li key={n} className="flex items-center gap-3 text-slate-200"><Icons.Check size={16} className="text-yellow-400 flex-shrink-0"/>{n}</li>)}</ul>}
                  </button>
                ))}
                {targetMarkets.filter(m=>m.id==='corporate').map(m=>(
                  <button key={m.id} onClick={()=>setActiveSegment(activeSegment===m.id?null:m.id)}
                    className={`md:col-span-7 text-left rounded-3xl p-8 border-2 transition-all duration-300 bg-slate-900 hover:scale-105 shadow-xl ${activeSegment===m.id?`${m.border} shadow-2xl`:'border-slate-700'}`}>
                    <div className={`bg-gradient-to-br ${m.color} w-16 h-16 rounded-2xl flex items-center justify-center mb-5`}><m.icon size={32} className="text-white" strokeWidth={2.5}/></div>
                    <div className="flex items-start justify-between mb-3">
                      <h3 className="text-2xl font-bold text-white">{m.emoji} {m.label}</h3>
                      <span className={`bg-gradient-to-br ${m.color} text-white font-black text-xl px-4 py-1 rounded-xl`}>{m.share}</span>
                    </div>
                    <p className="text-slate-400 text-sm">Segment: <span className="text-slate-200">{m.age}</span> · Portfolio: <span className="text-slate-200">{m.income}</span></p>
                    <p className="text-slate-300 mt-3">{m.goal}</p>
                    {activeSegment===m.id && <ul className="mt-5 space-y-2">{m.needs.map(n=><li key={n} className="flex items-center gap-3 text-slate-200"><Icons.Check size={16} className="text-blue-400 flex-shrink-0"/>{n}</li>)}</ul>}
                  </button>
                ))}
                {targetMarkets.filter(m=>['firsthome','diaspora','professionals'].includes(m.id)).map(m=>(
                  <button key={m.id} onClick={()=>setActiveSegment(activeSegment===m.id?null:m.id)}
                    className={`md:col-span-4 text-left rounded-3xl p-8 border-2 transition-all duration-300 bg-slate-900 hover:scale-105 shadow-xl ${activeSegment===m.id?`${m.border} shadow-2xl`:'border-slate-700'}`}>
                    <div className={`bg-gradient-to-br ${m.color} w-16 h-16 rounded-2xl flex items-center justify-center mb-5`}><m.icon size={32} className="text-white" strokeWidth={2.5}/></div>
                    <div className="flex items-start justify-between mb-3">
                      <h3 className="text-xl font-bold text-white">{m.emoji} {m.label}</h3>
                      <span className={`bg-gradient-to-br ${m.color} text-white font-black text-lg px-3 py-1 rounded-xl`}>{m.share}</span>
                    </div>
                    <p className="text-slate-400 text-sm">Age: <span className="text-slate-200">{m.age}</span></p>
                    <p className="text-slate-300 mt-2 text-sm">{m.goal}</p>
                    {activeSegment===m.id && <ul className="mt-4 space-y-2">{m.needs.map(n=><li key={n} className="flex items-center gap-2 text-slate-200 text-sm"><Icons.Check size={14} className="text-yellow-400 flex-shrink-0"/>{n}</li>)}</ul>}
                  </button>

              </div>
              {/* Market share bar */}
              <div className="bg-slate-900 rounded-2xl p-6 border border-slate-700">
                <p className="text-slate-400 text-sm font-semibold uppercase tracking-widest mb-4">Market Share Distribution</p>
                <div className="flex rounded-full overflow-hidden h-6">
                  {targetMarkets.map(m=><div key={m.id} className={`bg-gradient-to-r ${m.color} opacity-80`} style={{width:m.share}}/>)}
                </div>
                <div className="flex flex-wrap gap-4 mt-4">
                  {targetMarkets.map(m=>(
                    <div key={m.id} className="flex items-center gap-2 text-sm">
                      <div className={`w-3 h-3 rounded-full bg-gradient-to-br ${m.color}`}/>
                      <span className="text-slate-400">{m.label}</span>
                      <span className="text-slate-200 font-bold">{m.share}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* INTEGRATIONS */}
          <section id="integrations" className="py-24 bg-slate-900">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <div className="inline-flex items-center gap-3 bg-yellow-400/10 border border-yellow-400/30 rounded-full px-6 py-2 mb-6">
                  <Icons.Zap size={18} className="text-yellow-400"/>
                  <span className="text-yellow-400 text-sm font-semibold tracking-widest uppercase">Powered by Zapier</span>
                </div>
                <h2 className="text-5xl font-bold text-white mb-4">Seamless Integrations</h2>
                <p className="text-xl text-slate-300 max-w-2xl mx-auto">Bellring connects your entire property stack — accounting, payments, reporting & lead capture — all automated</p>
              </div>

              {/* Orbit hub */}
              <div className="flex flex-col items-center mb-20">
                <div className="relative flex items-center justify-center" style={{width:320,height:320}}>
                  <div className="absolute w-72 h-72 rounded-full border border-yellow-400/10 animate-spin-slow"/>
                  <div className="absolute w-52 h-52 rounded-full border border-yellow-400/15 animate-spin-slow-reverse"/>
                  <div className="relative z-10 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-2xl w-20 h-20 flex items-center justify-center shadow-2xl">
                    <Icons.Zap size={40} className="text-slate-900" strokeWidth={2.5}/>
                  </div>
                  {integrations.map((intg,i)=>{
                    const angle=(i/integrations.length)*360;
                    const rad=(angle*Math.PI)/180;
                    const r=128;
                    const x=Math.cos(rad-Math.PI/2)*r;
                    const y=Math.sin(rad-Math.PI/2)*r;
                    return (
                      <button key={intg.id}
                        onClick={()=>setActiveIntegration(activeIntegration===intg.id?null:intg.id)}
                        title={intg.name}
                        className={`absolute w-14 h-14 rounded-2xl flex items-center justify-center border-2 transition-all duration-300 hover:scale-125 ${intg.bg} ${activeIntegration===intg.id?intg.border+' scale-125 shadow-xl':'border-slate-600'}`}
                        style={{transform:`translate(calc(${x}px - 50%), calc(${y}px - 50%))`,left:'50%',top:'50%'}}
                      >
                        <span style={{fontWeight:900,fontSize:'1.4rem',color:intg.logoColor}}>{intg.logo}</span>
                      </button>
                    );
                  })}
                </div>
                <p className="text-slate-500 text-sm mt-4">Click any app icon or card to explore its integration</p>
              </div>

              {/* Cards */}
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16">
                {integrations.map(intg=>(
                  <button key={intg.id}
                    onClick={()=>setActiveIntegration(activeIntegration===intg.id?null:intg.id)}
                    className={`text-left rounded-2xl p-6 border-2 transition-all duration-300 bg-slate-800 hover:scale-105 ${activeIntegration===intg.id?`${intg.border} shadow-2xl ${intg.glow}`:'border-slate-700 hover:border-slate-500'}`}
                  >
                    <div className="flex items-start justify-between mb-4">
                      <div className={`w-14 h-14 rounded-xl flex items-center justify-center ${intg.bg} border ${intg.border}`}>
                        <span style={{fontWeight:900,fontSize:'1.5rem',color:intg.logoColor}}>{intg.logo}</span>
                      </div>
                      <div className="text-right">
                        <span className="text-xs bg-green-400/20 text-green-400 border border-green-400/30 rounded-full px-3 py-1 font-semibold">● Live</span>
                        <div className={`mt-2 text-xl font-black bg-gradient-to-r ${intg.color} bg-clip-text text-transparent`}>{intg.stat.value}</div>
                        <div className="text-slate-500 text-xs">{intg.stat.label}</div>
                      </div>
                    </div>
                    <span className="text-xs text-slate-500 uppercase tracking-widest">{intg.category}</span>
                    <h3 className="text-xl font-bold text-white mb-2">{intg.name}</h3>
                    <p className="text-slate-400 text-sm mb-4 leading-relaxed">{intg.desc}</p>
                    <div className="flex items-center gap-1 bg-slate-900 rounded-xl px-3 py-2 text-xs flex-wrap">
                      <span className="text-slate-500">Trigger:</span>
                      <span className="text-yellow-300 font-medium">{intg.trigger}</span>
                      <Icons.ChevronRight size={10} className="text-slate-600 mx-1"/>
                      <span className="text-slate-500">Action:</span>
                      <span className="text-green-300 font-medium">{intg.action}</span>
                    </div>
                    {activeIntegration===intg.id && (
                      <ul className="space-y-2 mt-4 border-t border-slate-700 pt-4">
                        {intg.features.map(f=>(
                          <li key={f} className="flex items-center gap-2 text-slate-200 text-sm">
                            <Icons.CheckCircle size={14} className="text-green-400 flex-shrink-0"/>{f}
                          </li>
                        ))}
                      </ul>
                    )}
                  </button>
                ))}
              </div>

              {/* Automation demo */}
              <div className="bg-slate-800 rounded-3xl p-8 border border-slate-700">
                <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
                  <div>
                    <h3 className="text-2xl font-bold text-white mb-1">🤖 Live Automation Demo</h3>
                    <p className="text-slate-400 text-sm">Watch a new tenant application flow through the entire Bellring stack automatically</p>
                  </div>
                  <button onClick={runDemo} disabled={demoRunning}
                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${demoRunning?'bg-slate-700 text-slate-400 cursor-not-allowed':'bg-gradient-to-r from-yellow-400 to-orange-500 text-slate-900 hover:scale-105'}`}>
                    {demoRunning?<><Icons.RefreshCw size={18} className="animate-spin"/> Running…</>:<><Icons.Activity size={18}/> Run Demo</>}
                  </button>
                </div>
                <div className="flex items-start justify-between gap-2 overflow-x-auto pb-2">
                  {flowSteps.map((step,i)=>(
                    <Fragment key={i}>
                      <div className={`flex flex-col items-center gap-2 min-w-max transition-all duration-500 ${flowStep>=i?'opacity-100 scale-110':'opacity-25 scale-95'}`}>
                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-2xl border-2 transition-all duration-500 ${flowStep>=i?`${step.bg} ${step.border} shadow-lg`:'bg-slate-900 border-slate-700'}`}>
                          {step.icon}
                        </div>
                        <span className={`text-xs font-bold ${flowStep>=i?step.color:'text-slate-600'}`}>{step.label}</span>
                        <span className="text-slate-500 text-xs text-center" style={{maxWidth:80,lineHeight:1.3}}>{step.desc}</span>
                      </div>
                      {i<flowSteps.length-1&&(
                        <div className={`flex-1 h-0.5 mt-8 rounded-full transition-all duration-500 min-w-4 ${flowStep>i?'bg-gradient-to-r from-yellow-400 to-orange-400':'bg-slate-700'}`}/>
                      )}
                    </Fragment>
                  ))}
                </div>
                {flowStep===flowSteps.length-1&&(
                  <div className="mt-6 bg-green-400/10 border border-green-400/30 rounded-xl px-6 py-4 flex items-center gap-3">
                    <Icons.CheckCircle size={20} className="text-green-400 flex-shrink-0"/>
                    <span className="text-green-300 font-semibold">Automation complete — tenant onboarded, deposit collected, books reconciled, dashboard updated. Zero manual work. ✨</span>
                  </div>
                )}
              </div>
            </div>
          </section>

          {/* INVESTMENT */}
          <section className="py-24 bg-slate-800">
            <div className="max-w-7xl mx-auto px-6">
              <div className="bg-gradient-to-br from-yellow-400 to-orange-500 rounded-3xl p-10 text-slate-900">
                <div className="grid md:grid-cols-2 gap-12 items-center">
                  <div>
                    <h2 className="text-4xl font-bold mb-6">Current Investment Opportunity</h2>
                    <h3 className="text-3xl font-bold mb-4">The Bell Tower Residences</h3>
                    <p className="text-xl mb-6">123 Long Street, Cape Town CBD</p>
                    <ul className="space-y-3 mb-8">
                      {['15-20% Projected Returns','R15M Total Investment','24 Luxury Apartments','Prime CBD Location'].map(item=>(
                        <li key={item} className="flex items-center gap-3"><Icons.Check size={24} strokeWidth={3}/><span className="text-lg">{item}</span></li>
                      ))}
                    </ul>
                    <button className="bg-slate-900 text-yellow-400 px-8 py-4 rounded-lg font-bold text-lg hover:bg-slate-800 transition-colors">View Investment Details</button>
                  </div>
                  <div className="grid grid-cols-2 gap-6">
                    {[[Icons.Building,'24','Residential Units'],[Icons.MapPin,'CBD','Prime Location'],[Icons.BarChart3,'18%','3-Year ROI'],[Icons.TrendingUp,'R500K','Min. Investment']].map(([Ic,val,label])=>(
                      <div key={label} className="bg-slate-900/30 backdrop-blur rounded-2xl p-6 text-center">
                        <Ic className="mx-auto mb-3" size={48}/>
                        <div className="text-3xl font-bold mb-1">{val}</div>
                        <div className="text-sm">{label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* WHY */}
          <section id="about" className="py-24 bg-slate-900">
            <div className="max-w-7xl mx-auto px-6">
              <h2 className="text-5xl font-bold text-white text-center mb-16">Why Choose Bellring?</h2>
              <div className="grid md:grid-cols-2 gap-12">
                {[
                  ['Proven Track Record','Over 15 years of successful property investments across South Africa, with zero defaults and consistent above-market returns.'],
                  ['Expert Team','Our leadership brings together expertise in real estate development, finance, architecture, and property management.'],
                  ['Local Knowledge','Deep understanding of Cape Town\'s property market, zoning regulations, and neighborhood dynamics gives us a competitive edge.'],
                  ['Investor-First','We invest our own capital alongside our investors, ensuring complete alignment of interests and transparent quarterly reporting.'],
                ].map(([title,text])=>(
                  <div key={title} className="bg-slate-800 rounded-2xl p-8 border border-slate-700">
                    <h3 className="text-3xl font-bold text-yellow-400 mb-4">{title}</h3>
                    <p className="text-slate-300 text-lg leading-relaxed">{text}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* CTA */}
          <section className="py-24 bg-gradient-to-br from-purple-900 to-slate-900">
            <div className="max-w-4xl mx-auto px-6 text-center">
              <h2 className="text-5xl font-bold text-white mb-6">Ready to Ring in Success?</h2>
              <p className="text-xl text-slate-300 mb-8">Let's discuss how we can help you achieve your property goals</p>
              <div className="flex items-center justify-center gap-4 flex-wrap">
                <button className="bg-yellow-400 text-slate-900 px-10 py-5 rounded-lg font-bold text-xl hover:bg-yellow-300 transition-colors">Schedule Consultation</button>
                <button className="border-2 border-yellow-400 text-yellow-400 px-10 py-5 rounded-lg font-bold text-xl hover:bg-yellow-400 hover:text-slate-900 transition-colors">Download Brochure</button>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="bg-slate-950 py-12 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-6">
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-3">
                  <button onClick={playDingDong} className="bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full w-10 h-10 flex items-center justify-center">
                    <Icons.Bell size={20} className="text-slate-900" strokeWidth={2.5}/>
                  </button>
                  <span className="text-2xl font-bold text-yellow-400">Bellring</span>
                </div>
                <div className="text-slate-400 text-center">
                  <p className="mb-2">📍 Waterfront Office Park, Cape Town</p>
                  <p className="mb-2">📞 +27 21 555 0123</p>
                  <p>📧 invest@bellring.co.za</p>
                </div>
                <div className="flex flex-col items-end gap-2">
                  <p className="text-slate-500 text-xs uppercase tracking-widest mb-1">Powered by</p>
                  <div className="flex items-center gap-2 flex-wrap justify-end">
                    <div className="w-8 h-8 rounded-lg bg-yellow-400/20 border border-yellow-400/40 flex items-center justify-center">
                      <Icons.Zap size={16} className="text-yellow-400"/>
                    </div>
                    {integrations.map(intg=>(
                      <div key={intg.id} title={intg.name} className={`w-8 h-8 rounded-lg flex items-center justify-center ${intg.bg} border border-slate-700 opacity-60 hover:opacity-100 transition-opacity`}>
                        <span style={{fontSize:'0.8rem',fontWeight:900,color:intg.logoColor}}>{intg.logo}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <p className="text-slate-500 text-center mt-8">© 2026 Bellring Property Group · Built by FatherLeonT</p>
            </div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
